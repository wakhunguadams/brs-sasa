version: '3.8'

services:
  brs-sasa:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DEBUG=${DEBUG:-false}
      - DEFAULT_LLM_PROVIDER=${DEFAULT_LLM_PROVIDER:-gemini}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - DATABASE_URL=${DATABASE_URL:-sqlite:///./brs_sasa.db}
      - VECTOR_DB_TYPE=${VECTOR_DB_TYPE:-chroma}
      - CHROMA_PERSIST_DIR=/app/chroma_data
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./chroma_data:/app/chroma_data
      - ./data:/app/data
      - ./logs:/app/logs
      - ./acts:/app/acts
      - ./regulations:/app/regulations
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  redis_data: